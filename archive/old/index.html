<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>숙박업 영업지도</title>
<meta name="theme-color" content="#172033">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영업지도">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
:root{--planned:#22c55e;--today:#e9a800;--visited:#2563eb;--excluded:#ef4444;--ink:#172033;--muted:#667085;--line:#dfe5ef;--bg:#f4f6fa}
*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--ink);background:var(--bg)}
button,input,select,textarea{font:inherit}button{cursor:pointer}
#app{display:grid;grid-template-columns:370px 1fr}#sidebar{background:#fff;border-right:1px solid var(--line);padding:15px;overflow:auto;z-index:500}#map{height:100%}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.header h1{font-size:20px;margin:0}.version{font-size:10px;color:var(--muted);background:#eef2f6;border-radius:999px;padding:4px 7px}
.sub{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 0 10px}
.offline{display:none;padding:8px;border-radius:8px;background:#fff3cd;color:#795b00;font-size:11px;margin-bottom:8px}.offline.show{display:block}
.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:9px}.toolbar button,.file-label{border:1px solid #cfd7e5;background:#fff;color:#344054;border-radius:9px;padding:9px 8px;font-weight:750;font-size:12px;text-align:center}.toolbar .primary{background:var(--ink);color:#fff;border-color:var(--ink)}.toolbar .add{background:#eaf8ef;color:#166534;border-color:#b7e4c7}.toolbar .danger{background:#fff3f2;color:#b42318;border-color:#fecdca}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}.stat{border:1px solid var(--line);border-radius:10px;padding:8px 5px;background:#fafbfc;text-align:center}.stat strong{display:block;font-size:18px}.stat span{font-size:10px;color:var(--muted)}.stat.active{outline:2px solid var(--ink)}
label.field{font-size:12px;font-weight:750;display:block;margin:9px 0 5px}input,select,textarea{width:100%;border:1px solid #cfd7e5;border-radius:8px;padding:9px;background:#fff}textarea{resize:vertical;min-height:82px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.check{font-size:12px;margin:9px 0;display:flex;align-items:center;gap:6px}.check input{width:auto}
#reset{width:100%;border:0;border-radius:8px;padding:9px;background:#eef2f6;color:#344054;font-weight:750}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;font-size:11px}.legend i{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
.notice{font-size:11px;color:#795b00;background:#fff8dd;border:1px solid #f1d274;border-radius:8px;padding:9px;line-height:1.5}
#list{margin-top:10px;border-top:1px solid var(--line)}.item{padding:9px 4px;border-bottom:1px solid #edf0f5;cursor:pointer}.item:hover{background:#f8fafc}.item b{font-size:13px}.item small{display:block;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hotel-label{background:rgba(255,255,255,.94);border:1px solid #98a2b3;border-radius:4px;color:var(--ink);font-weight:750;font-size:10px;padding:2px 4px;box-shadow:0 1px 3px #0002}
.popup{min-width:270px}.popup h3{margin:0 0 4px;font-size:17px}.meta{font-size:12px;color:var(--muted);margin-bottom:7px}.badge{display:inline-block;padding:3px 7px;border-radius:999px;font-size:10px;font-weight:800;color:white}.badge.planned{background:var(--planned)}.badge.today{background:var(--today);color:#3d2a00}.badge.visited{background:var(--visited)}.badge.excluded{background:var(--excluded)}
.popup table{width:100%;border-collapse:collapse;font-size:12px}.popup td{padding:4px 2px;border-bottom:1px solid #eee;vertical-align:top}.popup td:first-child{width:70px;color:var(--muted);font-weight:700}
.statusbar,.actions{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}.statusbar button,.actions button,.actions a{border:0;border-radius:8px;padding:8px;font-weight:750;font-size:12px;text-decoration:none;text-align:center}.planned{background:var(--planned);color:white}.today{background:var(--today);color:#3d2a00}.visited{background:var(--visited);color:white}.excluded{background:var(--excluded);color:white}.save{background:var(--ink);color:#fff}.naver{background:#03c75a;color:#fff}.edit{background:#eef2f6;color:#344054}.delete{background:#fff3f2;color:#b42318}
.modal-wrap{position:fixed;inset:0;background:#0008;z-index:2000;display:none;align-items:center;justify-content:center;padding:15px}.modal-wrap.show{display:flex}.modal{width:min(560px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:16px;padding:16px;box-shadow:0 20px 60px #0004}.modal h2{margin:0 0 4px;font-size:19px}.modal .hint{font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:9px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}.modal-actions button{border:0;border-radius:9px;padding:10px;font-weight:800}.cancel{background:#eef2f6;color:#344054}.confirm{background:var(--ink);color:#fff}
.map-pick{font-size:11px;background:#eef8ff;border:1px solid #b9dbf5;padding:8px;border-radius:8px;margin-top:8px;color:#175985}
@media(max-width:820px){#app{grid-template-columns:1fr;grid-template-rows:48% 52%}#sidebar{border-right:0;border-bottom:1px solid var(--line);padding:11px}.header h1{font-size:18px}.stats{gap:4px}.stat{padding:6px 3px}.stat strong{font-size:16px}.toolbar{grid-template-columns:repeat(2,1fr)}}
@media(display-mode:standalone){.version::after{content:" · 설치됨"}}

.sales-pill{display:inline-block;background:#eef2ff;color:#3446a8;border-radius:7px;padding:4px 7px;font-weight:800}.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:6px 0}.action-check{display:flex;align-items:center;gap:6px;border:1px solid #e3e8f0;border-radius:7px;padding:6px;font-size:11px;background:#fafbfc}.action-check input{width:auto;margin:0}.tag{display:inline-block;background:#eef2ff;color:#3949ab;border-radius:999px;padding:3px 7px;margin:2px 3px 2px 0;font-size:10px;font-weight:750}.timeline{margin-top:9px;border-left:2px solid #dfe5ef;padding-left:10px;max-height:210px;overflow:auto}.log{position:relative;padding:0 0 10px 4px}.log:before{content:"";position:absolute;left:-16px;top:4px;width:8px;height:8px;border-radius:50%;background:#2563eb;border:2px solid #fff}.log b{font-size:11px}.log p{margin:3px 0 0;white-space:pre-wrap;font-size:12px;line-height:1.45}.section-title{font-size:12px;font-weight:850;margin:10px 0 5px}.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.popup textarea.compact{min-height:62px}.meeting-pill{display:inline-block;background:#eaf8ef;color:#166534;border-radius:7px;padding:4px 7px;font-weight:750}.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:rgba(23,32,51,.22)}.marker-cluster div{background:#172033;color:white;font-weight:800}
</style>
</head>
<body>
<div id="app">
<aside id="sidebar">
<div class="header"><h1>숙박업 영업지도</h1><span class="version">v2.1.1</span></div>
<div class="sub">STAYSYNC Sales CRM · 대표 미팅과 방문일지를 현재 기기에 자동 저장</div>
<div id="offline" class="offline">오프라인 상태야. 저장된 기록은 쓸 수 있지만 지도 타일과 네이버지도는 인터넷이 필요해.</div>
<div class="toolbar">
<button id="installBtn" class="primary" hidden>앱 설치</button>
<button id="addBtn" class="add">업장 추가</button>
<button id="exportBtn">전체 백업</button>
<label class="file-label">백업 복원<input id="importFile" type="file" accept=".json,application/json" hidden></label>
<button id="dataExportBtn">업장목록 내보내기</button>
<button id="clearBtn" class="danger">기록 초기화</button>
</div>
<div class="stats">
<div class="stat"><strong id="c-total">0</strong><span>전체 업장</span></div>
<button class="stat active" data-filter="planned"><strong id="c-planned">0</strong><span>방문 예정</span></button>
<button class="stat" data-filter="today"><strong id="c-today">0</strong><span>오늘 방문</span></button>
<button class="stat" data-filter="visited"><strong id="c-visited">0</strong><span>방문 완료</span></button>
<button class="stat" data-filter="excluded"><strong id="c-excluded">0</strong><span>영업 제외</span></button>
</div>
<label class="field">업장 검색</label><input id="search" placeholder="업장명, 지역, 대표 미팅, 계약상태, 태그, 방문일지">
<div class="row"><div><label class="field">지역</label><select id="area"><option value="">전체 지역</option></select></div><div><label class="field">최소 객실</label><input id="minRooms" type="number" min="0" placeholder="0"></div></div>
<label class="check"><input id="labels" type="checkbox" checked>핀 위 업장명 표시</label>
<button id="reset">필터 초기화 · 방문 예정 보기</button>
<div class="legend"><span><i style="background:var(--planned)"></i>방문 예정</span><span><i style="background:var(--today)"></i>오늘 방문</span><span><i style="background:var(--visited)"></i>방문 완료</span><span><i style="background:var(--excluded)"></i>영업 제외</span></div>
<div id="list"></div>
</aside>
<div id="map"></div>
</div>

<div id="editorWrap" class="modal-wrap" aria-hidden="true">
<div class="modal">
<h2 id="editorTitle">업장 추가</h2>
<div class="hint">주소는 표시·검색용이고, 지도 핀은 위도·경도로 결정돼. 아래 ‘지도에서 위치 선택’을 누른 뒤 지도를 클릭하면 좌표가 자동 입력된다.</div>
<input id="editId" type="hidden">
<div class="row"><div><label class="field">지역</label><input id="editArea" placeholder="예: 상남"></div><div><label class="field">업장명</label><input id="editName" placeholder="예: 호텔 아이콘"></div></div>
<div class="row"><div><label class="field">객실 수</label><input id="editRooms" type="number" min="0"></div><div><label class="field">초기 상태</label><select id="editStatus"><option value="planned">방문 예정</option><option value="today">오늘 방문</option><option value="visited">방문 완료</option><option value="excluded">영업 제외</option></select></div></div>
<label class="field">주소 또는 위치 설명</label><input id="editAddress" placeholder="정확한 주소 또는 위치 메모">
<div class="row"><div><label class="field">위도</label><input id="editLat" type="number" step="any"></div><div><label class="field">경도</label><input id="editLon" type="number" step="any"></div></div>
<button id="pickBtn" style="margin-top:8px;width:100%;border:1px solid #b9dbf5;background:#eef8ff;color:#175985;border-radius:8px;padding:9px;font-weight:800">지도에서 위치 선택</button>
<div id="pickHint" class="map-pick" hidden>창을 닫지 말고 지도에서 원하는 위치를 클릭해줘. 좌표가 자동 입력된다.</div>
<label class="field">운영 특징·기존 정보</label><textarea id="editNote"></textarea>
<label class="field">키오스크·PMS 업체</label><input id="editVendor" placeholder="예: 야놀자 키오스크, 벤디트">
<label class="field">대표 미팅</label><input id="editMeeting" placeholder="예: 월·수·금 16시 이후 / 전화 후 방문">
<div class="row"><div><label class="field">계약상태</label><select id="editSalesStage"><option>미접촉</option><option>상담중</option><option>대표미팅</option><option>검토중</option><option>보류</option><option>도입완료</option><option>영업제외</option></select></div><div><label class="field">태그</label><input id="editTags" placeholder="벤디트, 재방문, AI예약관심"></div></div>
<label class="field">진행 액션</label><div id="editActions" class="action-grid"></div>
<div class="modal-actions"><button id="cancelEdit" class="cancel">취소</button><button id="saveEdit" class="confirm">저장</button></div>
</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

let markers=[];
let activeStatus='planned';
let picking=false;
let editingId='';

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
function naverUrl(h){const q=h.address&&h.address!=='정확한 주소 확인 필요'?h.address:(h.area+' '+h.name);return 'https://map.naver.com/p/search/'+encodeURIComponent(q)}
function getHotel(id){return hotels.find(h=>h.id===id)}
function actionChecks(id,actions,prefix='action'){return ACTIONS.map((a,i)=>`<label class="action-check"><input type="checkbox" id="${prefix}-${id}-${i}" ${actions&&actions[a]?'checked':''}>${esc(a)}</label>`).join('')}
function tagsHtml(tags){return (tags||[]).map(t=>`<span class="tag">#${esc(t)}</span>`).join('')||'<span class="meta">태그 없음</span>'}
function logsHtml(logs){const arr=[...(logs||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.createdAt||'').localeCompare(a.createdAt||''));if(!arr.length)return '<div class="meta">아직 방문일지가 없어.</div>';return `<div class="timeline">${arr.map(x=>`<div class="log"><b>${esc(x.date||'-')} · ${esc(x.type||'방문')}</b><p>${esc(x.note||'내용 없음')}</p></div>`).join('')}</div>`}
function popupHtml(h){const s=state[h.id];return `<div class="popup"><h3>${esc(h.area+' '+h.name)}</h3><div class="meta"><span class="badge ${s.status}">${names[s.status]}</span> · ${h.rooms??'객실 수 확인 필요'}${h.rooms!==null?'객실':''}</div>
<table><tr><td>대표 미팅</td><td>${s.meeting?`<span class="meeting-pill">${esc(s.meeting)}</span>`:'-'}</td></tr><tr><td>계약상태</td><td><span class="sales-pill">${esc(s.salesStage||'미접촉')}</span></td></tr><tr><td>방문 횟수</td><td>${s.visitCount||0}회</td></tr><tr><td>최근 방문</td><td>${s.lastVisit||'-'}</td></tr><tr><td>다음 방문</td><td>${s.nextVisit||'-'}</td></tr><tr><td>장비·업체</td><td>${esc(h.vendor||'미확인')}</td></tr></table>
<div class="section-title">태그</div><div>${tagsHtml(s.tags)}</div>
<div class="statusbar"><button class="planned" onclick="setStatus('${h.id}','planned')">방문 예정</button><button class="today" onclick="setStatus('${h.id}','today')">오늘 방문</button><button class="visited" onclick="setStatus('${h.id}','visited')">방문 완료</button><button class="excluded" onclick="setStatus('${h.id}','excluded')">영업 제외</button></div>
<div class="section-title">영업 정보 수정</div><label class="field">대표 미팅</label><input id="meeting-${h.id}" value="${esc(s.meeting||'')}" placeholder="예: 월·수·금 16시 이후 / 전화 후 방문"><div class="mini-grid"><div><label class="field">계약상태</label><select id="salesstage-${h.id}">${SALES_STAGES.map(v=>`<option ${s.salesStage===v?'selected':''}>${v}</option>`).join('')}</select></div><div><label class="field">다음 방문일</label><input id="next-${h.id}" type="date" value="${esc(s.nextVisit||'')}"></div></div><label class="field">진행 액션</label><div class="action-grid">${actionChecks(h.id,s.actions)}</div><label class="field">태그</label><input id="tags-${h.id}" value="${esc((s.tags||[]).join(', '))}" placeholder="벤디트, 대표미팅, 재방문"><label class="field">요약 메모</label><textarea class="compact" id="memo-${h.id}" placeholder="현재 핵심 상황만 간단히">${esc(s.memo||'')}</textarea><button class="save" style="width:100%;border:0;border-radius:8px;padding:9px;margin-top:7px;font-weight:800" onclick="saveProfile('${h.id}')">영업 정보 저장</button>
<div class="section-title">방문일지 추가</div><div class="mini-grid"><input id="logdate-${h.id}" type="date" value="${new Date().toISOString().slice(0,10)}"><select id="logtype-${h.id}"><option>첫 방문</option><option>재방문</option><option>대표 미팅</option><option>전화 상담</option><option>계약 검토</option><option>계약 완료</option><option>부재</option></select></div><textarea class="compact" id="lognote-${h.id}" placeholder="오늘 대화 내용, 반응, 다음 액션"></textarea><button class="visited" style="width:100%;border:0;border-radius:8px;padding:9px;margin-top:7px;font-weight:800" onclick="addVisitLog('${h.id}')">방문일지 누적 저장</button>
<div class="section-title">방문 타임라인</div>${logsHtml(s.logs)}
<div class="actions"><a class="naver" href="${naverUrl(h)}" target="_blank" rel="noopener">네이버지도</a><button class="edit" onclick="openEditor('${h.id}')">업장 수정</button><button class="delete" onclick="deleteHotel('${h.id}')">업장 삭제</button></div></div>`}
function createMarker(h){const s=state[h.id];const m=L.circleMarker([h.lat,h.lon],{radius:s.status==='today'?9:7,fillColor:colors[s.status],color:'#fff',weight:s.status==='today'?3:1.5,fillOpacity:.95});m.hotelId=h.id;m.bindPopup(()=>popupHtml(getHotel(m.hotelId)),{maxWidth:350});m.bindTooltip(h.area+' '+h.name,{permanent:true,direction:'top',className:'hotel-label',offset:[0,-6]});return m}
function rebuildMarkers(){clusterGroup.clearLayers();markers=hotels.map(createMarker);refreshAreaOptions();updateAll()}
function refreshMarker(m){const h=getHotel(m.hotelId),s=state[m.hotelId];if(!h||!s)return;m.setLatLng([h.lat,h.lon]);m.setStyle({fillColor:colors[s.status],radius:s.status==='today'?9:7,weight:s.status==='today'?3:1.5});m.setTooltipContent(h.area+' '+h.name);m.setPopupContent(popupHtml(h))}
window.setStatus=(id,status)=>{state[id].status=status;persist();updateAll();const m=markers.find(x=>x.hotelId===id);if(m){refreshMarker(m);m.openPopup()}}
window.saveProfile=id=>{const s=state[id];const meeting=document.getElementById('meeting-'+id),salesStage=document.getElementById('salesstage-'+id),next=document.getElementById('next-'+id),tags=document.getElementById('tags-'+id),memo=document.getElementById('memo-'+id);if(meeting)s.meeting=meeting.value.trim();if(salesStage)s.salesStage=salesStage.value;if(next)s.nextVisit=next.value;const actions={};ACTIONS.forEach((a,i)=>{actions[a]=!!document.getElementById(`action-${id}-${i}`)?.checked});s.actions=actions;if(tags)s.tags=tags.value.split(',').map(x=>x.trim().replace(/^#/,'')).filter(Boolean);if(memo)s.memo=memo.value.trim();if(s.salesStage==='도입완료')s.actions['도입 완료']=true;if(s.salesStage==='영업제외')s.status='excluded';persist();updateAll();const m=markers.find(x=>x.hotelId===id);if(m){refreshMarker(m);m.openPopup()}}
window.addVisitLog=id=>{const s=state[id],date=document.getElementById('logdate-'+id)?.value,type=document.getElementById('logtype-'+id)?.value,note=document.getElementById('lognote-'+id)?.value.trim();if(!date||!note){alert('방문 날짜와 내용을 입력해줘.');return}s.logs=s.logs||[];s.logs.push({id:'log-'+Date.now(),date,type:type||'방문',note,createdAt:new Date().toISOString()});s.visitCount=s.logs.length;s.lastVisit=[...s.logs].map(x=>x.date).filter(Boolean).sort().pop()||date;s.status=type==='계약 완료'?'visited':s.status==='excluded'?'excluded':'visited';s.memo=note;persist();updateAll();const m=markers.find(x=>x.hotelId===id);if(m){refreshMarker(m);m.openPopup()}}
window.deleteHotel=id=>{const h=getHotel(id);if(!h||!confirm(`${h.area} ${h.name}을(를) 목록에서 삭제할까? 방문기록도 함께 삭제돼.`))return;hotels=hotels.filter(x=>x.id!==id);delete state[id];persist();rebuildMarkers()}

const areaSel=document.getElementById('area');
function refreshAreaOptions(){const current=areaSel.value;areaSel.innerHTML='<option value="">전체 지역</option>';[...new Set(hotels.map(h=>h.area).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko')).forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;areaSel.appendChild(o)});if([...areaSel.options].some(o=>o.value===current))areaSel.value=current}
function match(h){const q=document.getElementById('search').value.trim().toLowerCase(),area=areaSel.value,min=Number(document.getElementById('minRooms').value||0),s=state[h.id];const logText=(s.logs||[]).map(x=>(x.date||'')+' '+(x.type||'')+' '+(x.note||'')).join(' ');const hay=(h.area+' '+h.name+' '+h.note+' '+h.vendor+' '+h.address+' '+s.memo+' '+s.meeting+' '+s.salesStage+' '+Object.keys(s.actions||{}).filter(k=>s.actions[k]).join(' ')+' '+(s.tags||[]).join(' ')+' '+logText).toLowerCase();return s.status===activeStatus&&(!q||hay.includes(q))&&(!area||h.area===area)&&(!min||(h.rooms||0)>=min)}
function updateStats(){const total=document.getElementById('c-total');if(total)total.textContent=hotels.length;Object.keys(names).forEach(k=>{const el=document.getElementById('c-'+k);if(el)el.textContent=hotels.filter(h=>state[h.id]&&state[h.id].status===k).length})}
function updateAll(){updateStats();clusterGroup.clearLayers();const shown=[];const list=document.getElementById('list');list.innerHTML='';markers.forEach(m=>{refreshMarker(m);const h=getHotel(m.hotelId);if(h&&match(h)){clusterGroup.addLayer(m);shown.push(m)}});shown.sort((a,b)=>{const A=getHotel(a.hotelId),B=getHotel(b.hotelId);return A.area.localeCompare(B.area,'ko')||A.name.localeCompare(B.name,'ko')}).forEach(m=>{const h=getHotel(m.hotelId),s=state[h.id],latest=(s.logs||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0],d=document.createElement('div');d.className='item';d.innerHTML=`<b>${esc(h.area+' '+h.name)}</b><small>${esc(s.salesStage||'미접촉')} · ${esc(s.meeting||'대표 미팅 정보 없음')}${latest?' · '+esc(latest.note):s.memo?' · '+esc(s.memo):''}${s.nextVisit?' · 다음 '+s.nextVisit:''}</small>`;d.onclick=()=>{map.setView(m.getLatLng(),15);setTimeout(()=>m.openPopup(),250)};list.appendChild(d)});if(shown.length){const bounds=L.featureGroup(shown).getBounds();if(bounds.isValid())map.fitBounds(bounds.pad(.12),{maxZoom:13})}}
document.querySelectorAll('.stat').forEach(el=>el.onclick=()=>{document.querySelectorAll('.stat').forEach(x=>x.classList.remove('active'));el.classList.add('active');activeStatus=el.dataset.filter;updateAll()});
['search','area','minRooms'].forEach(id=>document.getElementById(id).addEventListener('input',updateAll));
document.getElementById('labels').onchange=e=>markers.forEach(m=>e.target.checked?m.openTooltip():m.closeTooltip());
document.getElementById('reset').onclick=()=>{activeStatus='planned';document.querySelectorAll('.stat').forEach(x=>x.classList.toggle('active',x.dataset.filter==='planned'));document.getElementById('search').value='';areaSel.value='';document.getElementById('minRooms').value='';updateAll()};

const wrap=document.getElementById('editorWrap');
function closeEditor(){wrap.classList.remove('show');wrap.setAttribute('aria-hidden','true');picking=false;document.getElementById('pickHint').hidden=true}
window.openEditor=id=>{editingId=id||'';const h=id?getHotel(id):null;document.getElementById('editorTitle').textContent=h?'업장 수정':'업장 추가';document.getElementById('editId').value=id||'';document.getElementById('editArea').value=h?.area||'';document.getElementById('editName').value=h?.name||'';document.getElementById('editRooms').value=h?.rooms??'';document.getElementById('editStatus').value=h?state[id].status:'planned';document.getElementById('editAddress').value=h?.address||'';document.getElementById('editLat').value=h?.lat??map.getCenter().lat.toFixed(6);document.getElementById('editLon').value=h?.lon??map.getCenter().lng.toFixed(6);document.getElementById('editNote').value=h?.note||'';document.getElementById('editVendor').value=h?.vendor||'';document.getElementById('editMeeting').value=h?state[id].meeting||'':'';document.getElementById('editSalesStage').value=h?state[id].salesStage||defaultStage(h):'미접촉';document.getElementById('editTags').value=h?(state[id].tags||[]).join(', '):'';document.getElementById('editActions').innerHTML=actionChecks('edit',h?state[id].actions||{}:{},'edit-action');wrap.classList.add('show');wrap.setAttribute('aria-hidden','false')}
document.getElementById('addBtn').onclick=()=>openEditor('');
document.getElementById('cancelEdit').onclick=closeEditor;
document.getElementById('pickBtn').onclick=()=>{picking=true;document.getElementById('pickHint').hidden=false;wrap.classList.remove('show')};
map.on('click',e=>{if(!picking)return;document.getElementById('editLat').value=e.latlng.lat.toFixed(6);document.getElementById('editLon').value=e.latlng.lng.toFixed(6);picking=false;wrap.classList.add('show');document.getElementById('pickHint').hidden=true});
document.getElementById('saveEdit').onclick=()=>{const area=document.getElementById('editArea').value.trim(),name=document.getElementById('editName').value.trim();if(!area||!name){alert('지역과 업장명은 꼭 입력해줘.');return}const lat=Number(document.getElementById('editLat').value),lon=Number(document.getElementById('editLon').value);if(!Number.isFinite(lat)||!Number.isFinite(lon)){alert('위도와 경도를 확인해줘.');return}const data={area,name,rooms:document.getElementById('editRooms').value===''?null:Number(document.getElementById('editRooms').value),address:document.getElementById('editAddress').value.trim()||'정확한 주소 확인 필요',lat,lon,approx:false,note:document.getElementById('editNote').value.trim(),vendor:document.getElementById('editVendor').value.trim()||'미확인'};const status=document.getElementById('editStatus').value,meeting=document.getElementById('editMeeting').value.trim(),salesStage=document.getElementById('editSalesStage').value,tags=document.getElementById('editTags').value.split(',').map(x=>x.trim().replace(/^#/,'')).filter(Boolean),actions={};ACTIONS.forEach((a,i)=>{actions[a]=!!document.getElementById(`edit-action-edit-${i}`)?.checked});if(editingId){Object.assign(getHotel(editingId),data);Object.assign(state[editingId],{status,meeting,salesStage,tags,actions})}else{const id=newId();const h=normalizeHotel({...data,id,initialStatus:status});hotels.push(h);state[id]={status,memo:'',visitCount:0,lastVisit:'',nextVisit:'',meeting,salesStage,tags,actions,logs:[]}}persist();closeEditor();rebuildMarkers()};

function downloadJSON(name,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
document.getElementById('exportBtn').onclick=()=>downloadJSON('숙박업_영업지도_전체백업_'+new Date().toISOString().slice(0,10)+'.json',{app:'staysync-sales-map',version:3,exportedAt:new Date().toISOString(),hotels,state});
document.getElementById('dataExportBtn').onclick=()=>downloadJSON('숙박업_영업지도_업장목록_'+new Date().toISOString().slice(0,10)+'.json',{app:'staysync-sales-map-hotels',version:1,hotels});
document.getElementById('importFile').onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const p=JSON.parse(await file.text());if(!confirm('현재 목록과 기록을 백업 파일로 교체할까? 교체 전에 현재 데이터를 내보내는 것을 권장해.'))return;if(Array.isArray(p.hotels)){hotels=p.hotels.map(normalizeHotel);savedState=p.state||{};Object.keys(state).forEach(k=>delete state[k]);initState()}else if(p.data){Object.assign(state,p.data)}else throw new Error('형식 오류');persist();rebuildMarkers();alert('백업을 복원했어.')}catch(err){alert('올바른 영업지도 백업 파일이 아니야.')}finally{e.target.value=''}};
document.getElementById('clearBtn').onclick=()=>{if(!confirm('방문상태와 메모를 초기값으로 되돌릴까? 업장 목록은 유지돼.'))return;Object.keys(state).forEach(k=>delete state[k]);savedState={};hotels.forEach(h=>{state[h.id]={status:h.initialStatus,memo:h.initialMemo||'',visitCount:h.initialVisitCount||0,lastVisit:h.initialLastVisit||'',nextVisit:h.initialNextVisit||'',meeting:h.initialMeeting||'',salesStage:h.initialSalesStage||defaultStage(h),actions:{},tags:h.initialTags||[],logs:[]}});persist();updateAll();alert('기록을 초기화했어.')};

let deferredPrompt=null;const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;installBtn.hidden=false});
installBtn.onclick=async()=>{if(!deferredPrompt){alert('iPhone은 Safari 공유 버튼에서 “홈 화면에 추가”를 선택해줘.');return}deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBtn.hidden=true};
window.addEventListener('appinstalled',()=>{installBtn.hidden=true;deferredPrompt=null});
function onlineState(){document.getElementById('offline').classList.toggle('show',!navigator.onLine)}window.addEventListener('online',onlineState);window.addEventListener('offline',onlineState);onlineState();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(console.error))}
refreshAreaOptions();rebuildMarkers();
</script>
</body></html>
